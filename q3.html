<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honeycomb — Q3 Anomaly Detection GA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f8fa;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --bg4: #e4e7ec;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #111827;
  --text2: #374151;
  --text3: #9ca3af;
  --red: #c0392b;
  --red-bg: rgba(192,57,43,0.07);
  --red-border: rgba(192,57,43,0.2);
  --green: #1a7f4b;
  --green-bg: rgba(26,127,75,0.07);
  --green-border: rgba(26,127,75,0.2);
  --blue: #1d4ed8;
  --blue-bg: rgba(29,78,216,0.06);
  --blue-border: rgba(29,78,216,0.18);
  --yellow: #d97706;
  --yellow-bg: rgba(217,119,6,0.08);
  --yellow-border: rgba(217,119,6,0.2);
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --nav-w: 48px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow: hidden; }
.app { display: flex; height: 100vh; }

/* LEFT NAV — icon-only like real Honeycomb */
.leftnav { width: var(--nav-w); background: #1a1f2e; display: flex; flex-direction: column; align-items: center; padding: 8px 0; flex-shrink: 0; gap: 2px; }
.nav-logo { width: 28px; height: 28px; margin-bottom: 8px; }
.nav-icon { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.4); transition: all 0.15s; }
.nav-icon:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
.nav-icon.active { background: rgba(255,255,255,0.12); color: #fff; }
.nav-spacer { flex: 1; }
.nav-divider { width: 28px; height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; }

/* ENV BAR */
.env-bar { position: absolute; top: 0; left: var(--nav-w); right: 0; height: 36px; background: #1a1f2e; display: flex; align-items: center; padding: 0 16px; gap: 8px; z-index: 10; }
.env-pill { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.7); cursor: pointer; }
.env-pill:hover { color: #fff; }

/* MAIN */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; margin-top: 36px; }
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }

/* SHARED */
.page-chrome { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
.breadcrumb { display: flex; align-items: center; gap: 5px; font-size: 13px; margin-bottom: 8px; }
.bc-link { color: var(--blue); cursor: pointer; }
.bc-link:hover { text-decoration: underline; }
.bc-sep { color: var(--text3); }
.page-heading { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
.dataset-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); font-weight: 400; font-family: var(--mono); }
.badge { display: inline-flex; align-items: center; gap: 5px; height: 22px; padding: 0 9px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.badge.anomalous { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
.badge.normal { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
.badge.unknown { background: var(--bg3); border: 1px solid var(--border2); color: var(--text3); }
.badge.off { background: var(--bg3); border: 1px solid var(--border2); color: var(--text3); }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.anomalous { background: var(--red); }
.dot.normal { background: var(--green); }
.dot.unknown { background: var(--text3); }

/* ═══ ANOMALIES LIST ═══ */
.list-header { padding: 12px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); display: flex; align-items: center; gap: 10px; }
.search-wrap { flex: 1; max-width: 520px; position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.search-input { width: 100%; height: 32px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 0 10px 0 30px; font-size: 13px; color: var(--text2); font-family: var(--font); outline: none; }
.search-input::placeholder { color: var(--text3); }
.pagination { display: flex; align-items: center; gap: 4px; margin-left: auto; font-size: 13px; color: var(--text2); }
.page-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border2); background: var(--bg2); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; color: var(--text2); }
.page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

.table-wrap { flex: 1; overflow-y: auto; }
.table-head { display: grid; grid-template-columns: 120px 200px 1fr 220px 200px 140px; padding: 8px 24px; border-bottom: 1px solid var(--border); background: var(--bg3); position: sticky; top: 0; z-index: 1; }
.th { font-size: 12px; font-weight: 500; color: var(--text3); display: flex; align-items: center; gap: 4px; cursor: pointer; }
.th:hover { color: var(--text2); }

/* Service row group */
.svc-group { border-bottom: 1px solid var(--border); }
.svc-row { display: grid; grid-template-columns: 120px 200px 1fr 220px 200px 140px; padding: 10px 24px; align-items: start; background: var(--bg2); cursor: pointer; transition: background 0.1s; }
.svc-row:hover { background: var(--bg3); }
.svc-row.anomalous { background: #fef9f9; }
.svc-row.anomalous:hover { background: #fef2f2; }
.svc-name { font-size: 14px; font-weight: 500; color: var(--blue); }
.svc-name:hover { text-decoration: underline; }
.svc-dataset { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; display: flex; align-items: center; gap: 3px; }

/* Signal sub-rows */
.signal-sub-rows { background: var(--bg2); }
.svc-row.anomalous + .signal-sub-rows { background: #fef9f9; }
.signal-sub-row { display: grid; grid-template-columns: 120px 200px 1fr 220px 200px 140px; padding: 5px 24px 5px; align-items: center; border-top: 1px solid var(--border); }
.signal-cell { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.signal-cell a { color: var(--blue); text-decoration: none; cursor: pointer; }
.signal-cell a:hover { text-decoration: underline; }
.sig-icon { width: 16px; height: 16px; flex-shrink: 0; }
.last-anomaly-cell { font-size: 13px; color: var(--text2); }
.last-anomaly-cell.recent { color: var(--red); font-weight: 500; }
.actions-cell { display: flex; gap: 6px; align-items: center; }
.btn-sm { height: 28px; padding: 0 10px; border-radius: 4px; border: 1px solid var(--border2); background: var(--bg2); font-size: 12px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; font-family: var(--font); }
.btn-sm:hover { background: var(--bg3); }
.btn-sm.primary-sm { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
.new-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--blue); color: #fff; font-weight: 500; }

/* ═══ SERVICE DETAIL ═══ */
.service-detail-body { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg); display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-content: start; }
.signal-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
.signal-section-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.signal-section-title { font-size: 16px; font-weight: 600; flex: 1; }
.signal-section-meta { font-size: 12px; color: var(--text3); }
.signal-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
.toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--green); position: relative; cursor: pointer; flex-shrink: 0; }
.toggle::after { content:''; position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; }
.toggle.off { background: var(--border2); }
.toggle.off::after { left: 2px; right: auto; }
.signal-section-body { padding: 16px; }
.signal-chart-area { margin-bottom: 12px; }
.chart-legend-row { display: flex; gap: 16px; margin-bottom: 10px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-line { height: 2px; width: 18px; border-radius: 1px; }
.legend-band { height: 8px; width: 18px; border-radius: 2px; }
.sensitivity-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.change-btn { height: 24px; padding: 0 8px; border-radius: 4px; border: 1px solid var(--border2); background: var(--bg2); font-size: 12px; color: var(--text2); cursor: pointer; font-family: var(--font); }
.no-anomalies { font-size: 13px; color: var(--text3); padding: 4px 0 8px; }
.seasonality-callout { background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: 5px; padding: 8px 12px; font-size: 12px; color: #1d4ed8; margin-top: 10px; line-height: 1.6; }

/* Auto-investigation */
.auto-invest-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.auto-invest-header { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.auto-invest-row { display: flex; align-items: flex-start; gap: 10px; }
.auto-invest-icon { color: var(--blue); margin-top: 1px; flex-shrink: 0; }
.auto-invest-text { font-size: 13px; color: var(--text2); line-height: 1.6; flex: 1; }
.auto-invest-toggle { margin-left: auto; flex-shrink: 0; }

/* Right sidebar */
.detail-sidebar { display: flex; flex-direction: column; gap: 16px; }
.sidebar-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.sidebar-panel-title { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
.meta-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.meta-row:last-child { border-bottom: none; }
.meta-label { color: var(--text3); }
.meta-value { color: var(--text2); font-family: var(--mono); font-size: 12px; }
.explore-link { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: 5px; border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; background: var(--bg3); font-size: 13px; transition: background 0.1s; }
.explore-link:last-child { margin-bottom: 0; }
.explore-link:hover { background: var(--bg4); }
.explore-link-name { font-weight: 500; }
.explore-link-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
.explore-arrow { color: var(--blue); font-size: 13px; }
.recipients-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.recipients-row:last-child { border-bottom: none; }

/* ═══ SIGNAL DETAIL ═══ */
.signal-detail-chrome { padding: 20px 24px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
.signal-detail-title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.signal-detail-title { font-size: 22px; font-weight: 600; }
.signal-run-query { margin-left: auto; height: 34px; padding: 0 16px; background: var(--blue); border: none; border-radius: 6px; font-size: 13px; color: #fff; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 6px; }
.signal-detail-body { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg); }
.signal-chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.signal-sensitivity { font-size: 13px; color: var(--text2); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.anomalies-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.anomalies-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
.anomaly-table { width: 100%; border-collapse: collapse; }
.anomaly-table th { font-size: 12px; font-weight: 500; color: var(--text3); text-align: left; padding: 6px 0; border-bottom: 1px solid var(--border); }
.anomaly-table td { font-size: 13px; color: var(--text2); padding: 10px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
.anomaly-table tr:last-child td { border-bottom: none; }
.vote-group { display: flex; gap: 8px; }
.vote-btn { font-size: 12px; color: var(--text3); cursor: pointer; padding: 2px 8px; border-radius: 4px; border: 1px solid transparent; }
.vote-btn.yes:hover { border-color: var(--green-border); color: var(--green); }
.vote-btn.no:hover { border-color: var(--red-border); color: var(--red); }
.vote-btn:hover { border-color: var(--border2); color: var(--text2); }
.auto-invest-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.recipients-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.section-title-lg { font-size: 18px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.section-desc { font-size: 13px; color: var(--text2); margin-bottom: 14px; line-height: 1.6; }
.recipient-row { display: grid; grid-template-columns: 1fr 1fr 1fr 80px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; }
.recipient-row:last-child { border-bottom: none; }
.recipient-row .col-head { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; }

/* Ask canvas floating */
.ask-canvas-pill { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1.5px solid var(--blue-border); border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--blue); cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.1); z-index: 100; }
.ask-canvas-pill:hover { background: var(--blue-bg); }
</style>
</head>
<body>
<div class="app">

<!-- LEFT NAV -->
<div class="leftnav">
  <svg class="nav-logo" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="14" fill="#F5A623"/>
    <path d="M8 14h12M14 8v12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <div class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></div>
  <div class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <div class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 14l4-4 3 3 4-5 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M9 6v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  <div class="nav-divider"></div>
  <div class="nav-icon active"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2l1.5 4.5H15l-3.75 2.7 1.5 4.5L9 11.1l-3.75 2.6 1.5-4.5L3 6.5h4.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
  <div class="nav-spacer"></div>
  <div class="nav-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M9 8v5M9 6v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
</div>

<!-- ENV BAR -->
<div class="env-bar">
  <span class="env-pill">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/></svg>
    prod
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/></svg>
  </span>
</div>

<div class="main">

<!-- ═══ ANOMALIES LIST ═══ -->
<div class="screen active" id="screen-list">
  <div class="page-chrome">
    <div class="page-heading">
      Anomalies
      <span style="font-size:12px;padding:2px 8px;border-radius:4px;background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);font-weight:500">Beta</span>
    </div>
  </div>
  <div class="list-header">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5l2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input class="search-input" placeholder="Search by service name or status" id="search-input" oninput="filterList()">
    </div>
    <div class="pagination">
      <div class="page-btn">‹</div>
      <div class="page-btn active">1</div>
      <div class="page-btn">2</div>
      <div class="page-btn">3</div>
      <span style="color:var(--text3)">···</span>
      <div class="page-btn">10</div>
      <div class="page-btn">›</div>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-head">
      <span class="th">Status ⇅</span>
      <span class="th">Service Name ⇅</span>
      <span class="th">Recipients ⇅</span>
      <span class="th">Signal ⇅</span>
      <span class="th">Last anomaly detected ⇅</span>
      <span class="th"></span>
    </div>
    <div id="list-body"></div>
  </div>
</div>

<!-- ═══ SERVICE DETAIL ═══ -->
<div class="screen" id="screen-service">
  <div class="signal-detail-chrome">
    <div class="breadcrumb">
      <span class="bc-link" onclick="goTo('list')">Anomalies</span>
      <span class="bc-sep">/</span>
      <span id="svc-bc-name" style="color:var(--text)">payment</span>
    </div>
    <div class="signal-detail-title-row">
      <div class="page-heading">
        <span id="svc-heading">payment</span>
        <span class="dataset-tag">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/></svg>
          <span id="svc-dataset">basset</span>
        </span>
      </div>
      <button class="signal-run-query" style="margin-left:auto">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2h9v9" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/><path d="M2 11L11 2" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg>
        Run Query
      </button>
    </div>
  </div>
  <div class="service-detail-body" id="service-detail-body">
    <!-- rendered by JS -->
  </div>
  <div class="ask-canvas-pill">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 4H13L9.5 7.5l1.5 4L7 9 3 11.5l1.5-4L1 5h4.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
    Ask canvas
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M9 3L3 9M3 3h6v6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
  </div>
</div>

<!-- ═══ SIGNAL DETAIL ═══ -->
<div class="screen" id="screen-signal">
  <div class="signal-detail-chrome">
    <div class="breadcrumb">
      <span class="bc-link" onclick="goTo('list')">Anomalies</span>
      <span class="bc-sep">/</span>
      <span class="bc-link" onclick="goTo('service')" id="sig-bc-svc">payment</span>
      <span class="bc-sep">/</span>
      <span id="sig-bc-signal" style="color:var(--text)">Error rate</span>
    </div>
    <div class="signal-detail-title-row">
      <div class="page-heading">
        <span id="sig-heading">payment</span>
        <span class="dataset-tag">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/></svg>
          <span id="sig-dataset">basset</span>
        </span>
      </div>
      <button class="signal-run-query">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2h9v9" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/><path d="M2 11L11 2" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg>
        Run Query

// ── NAV ───────────────────────────────────────────────────────────────────

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

// ── SIGNAL ICONS ──────────────────────────────────────────────────────────
function warnIcon(color) {
  return `<svg class="sig-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" fill="${color}22" stroke="${color}" stroke-width="1.3"/><path d="M8 7v3M8 11.5v.5" stroke="${color}" stroke-width="1.3" stroke-linecap="round"/></svg>`;
}
function checkIcon(color) {

}
function presenceIcon(status) {
  return `<svg class="sig-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" fill="${status==='anomalous'?'#c0392b22':'#1a7f4b22'}" stroke="${status==='anomalous'?'#c0392b':'#1a7f4b'}" stroke-width="1.3"/><path d="M4 10l2-3 2 2 2-4 2 2" stroke="${status==='anomalous'?'#c0392b':'#1a7f4b'}" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function sigIcon(sig) {

// ── CHARTS ────────────────────────────────────────────────────────────────
const colorMap = { 'error-rate':'#1d4ed8','request-rate':'#7c3aed','latency':'#ea580c','presence':'#1d4ed8' };
const bandColorMap = { 'error-rate':'rgba(29,78,216,0.08)','request-rate':'rgba(124,58,237,0.08)','latency':'rgba(234,88,12,0.08)','presence':'rgba(0,0,0,0.04)' };

function drawMiniChart(id, chartType, status, sigType) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth, H = 80;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  _drawChart(ctx, W, H, chartType, status, sigType, false);
}

function drawFullChart(id, chartType, status, sigType, hasSeason) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth, H = 110;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  _drawChart(ctx, W, H, chartType, status, sigType, hasSeason);
}

function _drawChart(ctx, W, H, chartType, status, sigType, seasonal) {
  ctx.clearRect(0, 0, W, H);
  const pts = 80;
  const lineColor = colorMap[sigType] || '#1d4ed8';
  const bandColor = bandColorMap[sigType] || 'rgba(29,78,216,0.08)';

  const data = Array.from({length:pts}, (_, i) => {
    if (chartType === 'spike') { let v=0.2+Math.random()*0.1; if(i>55&&i<63)v=0.75+Math.random()*0.2; return v; }
    if (chartType === 'drop') { let v=0.65+Math.random()*0.08; if(i>55)v=0.06+Math.random()*0.05; return v; }
    if (chartType === 'presence') { return i>48&&i<56?0:0.85+Math.random()*0.08; }
    if (chartType === 'latency') { return 0.35+Math.random()*0.3; }
    return 0.35+Math.random()*0.12;
  });

  // Band — wavy if seasonal
  if (seasonal) {
    ctx.fillStyle = bandColor;
    ctx.beginPath();
    const upper = Array.from({length:pts}, (_, i) => 0.48+0.04*Math.sin(i*0.18));
    const lower = Array.from({length:pts}, (_, i) => 0.08+0.02*Math.sin(i*0.18));
    upper.forEach((v,i) => { const x=i/(pts-1)*W,y=H*(1-v); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    lower.slice().reverse().forEach((v,i) => { const x=(pts-1-i)/(pts-1)*W,y=H*(1-v); ctx.lineTo(x,y); });
    ctx.closePath(); ctx.fill();
  } else if (chartType === 'presence') {
    ctx.fillStyle = 'rgba(0,0,0,0.03)'; ctx.fillRect(0,0,W,H*0.3);
  } else {
    ctx.fillStyle = bandColor; ctx.fillRect(0,H*0.1,W,H*0.55);
  }

  // Anomaly highlight
  if (chartType === 'spike') { ctx.fillStyle='rgba(192,57,43,0.08)'; ctx.fillRect(W*55/pts,0,W*8/pts,H); }
  if (chartType === 'drop') { ctx.fillStyle='rgba(192,57,43,0.08)'; ctx.fillRect(W*55/pts,0,W*45/pts,H); }
  if (chartType === 'presence') { ctx.fillStyle='rgba(192,57,43,0.08)'; ctx.fillRect(W*48/pts,0,W*8/pts,H); }

  // Line
  ctx.strokeStyle = status === 'anomalous' ? (chartType==='spike'||chartType==='drop'||chartType==='presence'?lineColor:lineColor) : lineColor;
  ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.beginPath();
  data.forEach((v, i) => { const x=i/(pts-1)*W, y=H*(1-v*0.92); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();

  // Anomaly marker
  if (chartType === 'spike') {
    const ax=59/pts*W, ay=H*(1-data[59]*0.92);
    ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.moveTo(ax,ay-6); ctx.lineTo(ax-3,ay-11); ctx.lineTo(ax+3,ay-11); ctx.closePath(); ctx.fill();
  }
  if (chartType === 'drop') {
    const ax=57/pts*W, ay=H*(1-data[57]*0.92);
    ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.moveTo(ax,ay+6); ctx.lineTo(ax-3,ay+11); ctx.lineTo(ax+3,ay+11); ctx.closePath(); ctx.fill();
  }

  // X axis time labels
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = '10px "IBM Plex Mono"'; ctx.textAlign = 'center';
  ['14:30','14:45','15:00','15:15','15:30','15:45','16:00','16:15'].forEach((t,i,arr) => {
    const x = i/(arr.length-1)*W;
    ctx.fillText(t, x, H-2);
  });
}
